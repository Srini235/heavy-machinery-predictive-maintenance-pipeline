name: Mediclaim-AI Hybrid CI Pipeline

on:
  # 1. NIGHTLY TRIGGER: Automatically executes every single night at 02:00 UTC (07:30 AM IST)
  schedule:
    - cron: '0 2 * * *'
    
  # 2. MANUAL TRIGGER: Provides a Jenkins-style custom button to test on-demand
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Run Environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - production

jobs:
  verify-system-nodes:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pipeline Integrity Integration Test Suite
      run: |
        python -m pytest