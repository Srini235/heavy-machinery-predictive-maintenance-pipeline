version: '3.8'

services:
  api_gateway:
    build: .
    container_name: mediclaim_core_gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=db_node
    networks:
      - mediclaim_network
    depends_on:
      - db_node

  db_node:
    image: postgres:15-alpine
    container_name: mediclaim_postgres_ledger
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_ledger_pass
      - POSTGRES_DB=mediclaim_ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mediclaim_network

networks:
  mediclaim_network:
    driver: bridge

volumes:
  postgres_data: